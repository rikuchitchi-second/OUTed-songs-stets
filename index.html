<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ボカロ（OUT曲）週間ランキング</title>
  <meta name="description" content="OUT曲の週間再生数統計データです。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="wrapper">

  <header>
    <div class="site-title">
      <h1>ボカロ曲週間ランキング</h1>
      <p>Vocaloid Weekly Chart</p>
    </div>
  </header>

  <div class="controls" role="group" aria-label="期間選択">
    <button id="btn-prev" class="btn-nav" aria-label="前の週">◀ 前週</button>

    <div class="control-group">
      <label for="sel-year">年</label>
      <select id="sel-year"></select>
    </div>
    <div class="control-group">
      <label for="sel-month">月</label>
      <select id="sel-month"></select>
    </div>
    <div class="control-group">
      <label for="sel-week">週</label>
      <select id="sel-week"></select>
    </div>

    <button id="btn-next" class="btn-nav" aria-label="次の週">次週 ▶</button>

    <div class="controls-right">
      <button id="btn-toggle-views" class="btn-toggle">総再生数</button>
      <button id="btn-toggle-detail" class="btn-toggle">詳細回数</button>
      <button id="btn-toggle-chart" class="btn-toggle">📈 チャート</button>
    </div>
  </div>

  <p class="period-label" id="period-label">読み込み中...</p>

  <!-- ★ 順位推移チャート -->
  <div id="chart-wrap" style="display:none;">
    <div class="chart-header">
      <span class="chart-title">順位推移チャート</span>
      <span class="chart-hint">チャート表示中に曲をクリック → その曲を拡大表示</span>
    </div>
    <canvas id="rank-chart"></canvas>
    <div id="chart-legend" class="chart-legend"></div>
  </div>

  <main id="ranking-list" aria-label="ランキング一覧" aria-live="polite"></main>

  <footer>
    <p>「君と僕もさ、また明日へ向かっていこう。」</p>
    <p style="margin-top:0.5rem"><a href="https://github.com/" target="_blank" rel="noopener">GitHub Pages</a> でホスティング</p>
  </footer>

</div>
<script src="js/app.js"></script>
</body>
</html>
